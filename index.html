<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후배들을 위한 학습 가이드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --primary-color: #3498db; --dark-color: #2c3e50; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f4f7f9; color: #333; }
        header { background: var(--dark-color); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 900px; margin: -30px auto 50px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn { display: inline-block; background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>📖 후배들을 위한 지식 저장소</h1>
        <p>컴퓨터공학과 지망 선배가 직접 제작한 학습 가이드입니다.</p>
    </header>

    <div class="container">
        <section class="card">
            <h2>🎯 프로젝트 취지</h2>
            <p>혼자 고민하며 겪었던 시행착오들을 후배들은 겪지 않길 바라는 마음으로 제작했습니다. 진심으로 응원합니다!</p>
        </section>

        <section class="card">
            <h2>📚 과목별 공부 전략</h2>
            <p>이곳에 실제 공부법 내용을 채워 넣으세요. (예: 수학 오답노트 작성법 등)</p>
            <a href="#" class="btn">더 알아보기</a>
        </section>
    </div>
</body>
</html>
